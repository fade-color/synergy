name: Build Synergy v1.20.4

on:
  workflow_dispatch: # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v1.20.4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall
          aqt install-qt windows desktop 5.15.2 win64_mingw81 -m qtcore qtgui widgets network
      - name: Configure and Build
        run: |
          mkdir build
          cd build
          ..\Qt\5.15.2\mingw81_64\bin\qmake.exe ..\src\synergy.pro
          mingw32-make.exe -j4
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: synergy-windows
          path: build/release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v1.20.4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          brew install qt@5 cmake
          python -m pip install --upgrade pip
      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_PREFIX_PATH=$(brew --prefix qt@5) ..
          make -j4
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: synergy-macos
          path: build/bin/Synergy.app
