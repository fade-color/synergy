name: Build Synergy Master

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix submodule URL
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"
      - name: Create dummy version tag
        run: |
          git tag v0.0.0
          git update-ref refs/remotes/origin/master HEAD
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Qt
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall
          aqt install-qt windows desktop 5.15.2 win64_mingw81
      - name: Configure and Build
        shell: cmd
        run: |
          git submodule update --init --recursive
          mkdir build
          cd build
          cmake -G "MinGW Makefiles" -DCMAKE_PREFIX_PATH=..\Qt\5.15.2\mingw81_64 ..
          mingw32-make -j4
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: synergy-windows
          path: |
            build/bin/*.exe
            build/**/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix submodule URL
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"
      - name: Create dummy version tag
        run: |
          git tag v0.0.0
          git update-ref refs/remotes/origin/master HEAD
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: brew install qt@5 cmake
      - name: Configure and Build
        run: |
          git submodule update --init --recursive
          mkdir build
          cd build
          cmake -DCMAKE_PREFIX_PATH=$(brew --prefix qt@5) ..
          make -j4
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: synergy-macos
          path: build/bin/Synergy.app
